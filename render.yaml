services:
  - type: web
    name: dash-datacrazy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATACRAZY_TOKEN
        sync: false
      - key: DATACRAZY_MCP_URL
        value: https://mcp.g1.datacrazy.io/api/mcp
